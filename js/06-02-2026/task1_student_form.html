<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}

.card{
    margin-top:20px;
}
</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Student Registration Form</h2>

<form id="studentForm" class="border p-4 bg-white rounded">

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" id="name">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" id="email">
</div>

<div class="mb-3">
<label>Phone Number</label>
<input type="text" class="form-control" id="phone">
</div>

<div class="mb-3">
<label>Course</label>
<select class="form-select" id="course">
<option value="">Select Course</option>
<option>Computer Science</option>
<option>Information Science</option>
<option>Electronics</option>
</select>
</div>

<div class="mb-3">
<label>Gender</label><br>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
</div>

<div class="mb-3">
<label>Skills</label><br>
<input type="checkbox" value="HTML" class="skill"> HTML
<input type="checkbox" value="CSS" class="skill"> CSS
<input type="checkbox" value="JavaScript" class="skill"> JavaScript
</div>

<div class="mb-3">
<label>Address</label>
<textarea class="form-control" id="address"></textarea>
</div>

<button type="submit" class="btn btn-primary">Submit</button>

</form>

<div id="result"></div>

</div>

<script>

document.getElementById("studentForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let course=document.getElementById("course").value;
let address=document.getElementById("address").value;

let gender=document.querySelector('input[name="gender"]:checked');

let skills=document.querySelectorAll(".skill:checked");

let skillList=[];

skills.forEach(skill=>{
skillList.push(skill.value);
});

if(name==""){
alert("Name cannot be empty");
return;
}

if(!email.includes("@")){
alert("Email must contain @");
return;
}

if(phone.length!=10){
alert("Phone number must be 10 digits");
return;
}

let card=`
<div class="card p-3 mt-4">
<h4>Student Details</h4>
<p><b>Name:</b> ${name}</p>
<p><b>Email:</b> ${email}</p>
<p><b>Phone:</b> ${phone}</p>
<p><b>Course:</b> ${course}</p>
<p><b>Gender:</b> ${gender?gender.value:""}</p>
<p><b>Skills:</b> ${skillList.join(", ")}</p>
<p><b>Address:</b> ${address}</p>
</div>
`;

document.getElementById("result").innerHTML=card;

});

</script>

</body>
</html>
