<body>
    <h1>Conditional Statements in JavaScript</h1>
    <p>1. if statement</p>
    <p>2. if-else statement</p>
    <p>3. else-if ladder</p>
    <p>4. switch statement</p>

    <script>
        let age = 23;
        // if(condition) {
        // code
        // }
        if(age >= 18) {
            console.log("You are eligible to vote");
        }

        if(age >= 18) {
            console.log("You are eligible to vote");
        } else {
            console.log("You are not eligible to vote");
        }


        let marks = 85;
        if(marks >= 90) {
            console.log("Grade A");
        } 
        else if(marks >= 80) {
            console.log("Grade B");
        }
        else if(marks >= 70) {
            console.log("Grade C");
        }
        else {
            console.log("Grade D");
        }
