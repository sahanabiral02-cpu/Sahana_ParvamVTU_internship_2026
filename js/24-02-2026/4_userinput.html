<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>User Input in JS</h1>
    <p>prompt()</p>

    <script>
       const marks = prompt("Enter your marks: ");
       console.log(" Your marks is : ", marks);
       console.log("Type of marks: ", typeof marks);

       switch(marks) {
            case "90":{
                console.log("Grade A");
                break;
            }    
             case "80":{
                console.log("Grade B");
                break;
            }
            case "70":{
                console.log("Grade C");
                break;
           }
            default:{
                 console.log("Grade D");
           }
       
        }
    </script>  
    
</body>
</html>
