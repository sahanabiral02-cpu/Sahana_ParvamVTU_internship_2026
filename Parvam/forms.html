<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            width: 500px;
            background: white;
            padding: 25px 35px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: 500;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: vertical;
        }

        .options {
            margin-top: 8px;
        }

        .buttons {
            margin-top: 20px;
            text-align: center;
        }

        .clear-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .submit-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        .clear-btn:hover {
            background-color: #e60000;
        }

        .submit-btn:hover {
            background-color: #1e7e34;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Registration Form</h2>
    <form>

        <label>Email ID:</label>
        <input type="email" placeholder="Enter email">

        <label>Phone Number:</label>
        <input type="tel" placeholder="Enter phone number">

        <label>Password:</label>
        <input type="password" placeholder="Enter password">

        <label>Date of Birth:</label>
        <input type="date">

        <label>Address:</label>
        <textarea rows="3" placeholder="Enter your address"></textarea>

        <label>Courses:</label>
        <select>
            <option selected>Java Full Stack Web Development</option>
            <option>Python Full Stack Web Development</option>
            <option>Machine Learning</option>
        </select>

        <label>Languages Known:</label>
        <div class="options">
            <input type="checkbox" checked> Kannada
            <input type="checkbox"> Tamil
            <input type="checkbox"> Telugu
            <input type="checkbox"> Hindi
        </div>

        <label>Gender:</label>
        <div class="options">
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender" checked> Others
        </div>

        <label>Rating (10 - 50):</label>
        <input type="range" min="10" max="50" value="30">

        <div class="buttons">
            <button type="reset" class="clear-btn">Clear Form</button>
            <button type="submit" class="submit-btn">Submit Form</button>
        </div>

    </form>
</div>

</body>
</html>
