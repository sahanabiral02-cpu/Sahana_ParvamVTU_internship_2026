<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lion Website</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-warning">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Lion World 🦁</a>
  </div>
</nav>

<!-- ✅ CAROUSEL -->
<div id="lionCarousel" class="carousel slide" data-bs-ride="carousel">

  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="../bootsrap-assign/anramb-lion-6112181_1920.jpg"
           class="d-block w-100" height="500" style="object-fit:cover;">
    </div>

    <div class="carousel-item">
      <img src="../bootsrap-assign/joelfotos-lion-couple-1200105_1920.jpg"
           class="d-block w-100" height="500" style="object-fit:cover;">
    </div>

    <div class="carousel-item">
      <img src="../bootsrap-assign/nickype-lion-7383228_1920.jpg"
           class="d-block w-100" height="500" style="object-fit:cover;">
    </div>

  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#lionCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#lionCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>

<!-- ✅ GRID CARDS -->
<div class="container mt-5">
  <h2 class="text-center mb-4">Lion Species</h2>

  <div class="row">

    <div class="col-sm-12 col-md-6 col-lg-4 mb-4">
      <div class="card shadow">
        <img src="../bootsrap-assign/anramb-lion-6112181_1920.jpg"
             class="card-img-top" height="250" style="object-fit:cover;">
        <div class="card-body text-center">
          <h5 class="card-title">African Lion</h5>
          <p class="card-text">The king of the jungle found in Africa.</p>
        </div>
      </div>
    </div>

    <div class="col-sm-12 col-md-6 col-lg-4 mb-4">
      <div class="card shadow">
        <img src="../bootsrap-assign/joelfotos-lion-couple-1200105_1920.jpg"
             class="card-img-top" height="250" style="object-fit:cover;">
        <div class="card-body text-center">
          <h5 class="card-title">Male Lion</h5>
          <p class="card-text">Recognized by its large majestic mane.</p>
        </div>
      </div>
    </div>

    <div class="col-sm-12 col-md-6 col-lg-4 mb-4">
      <div class="card shadow">
        <img src="../bootsrap-assign/nickype-lion-7383228_1920.jpg"
             class="card-img-top" height="250" style="object-fit:cover;">
        <div class="card-body text-center">
          <h5 class="card-title">Wild Lion</h5>
          <p class="card-text">Lions resting in the African savannah.</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
