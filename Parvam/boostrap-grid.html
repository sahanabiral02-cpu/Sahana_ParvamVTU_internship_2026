<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Responsive Grid</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .box {
            color: white;
            text-align: center;
            padding: 15px 0;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .c1 { background: #e74c3c; }
        .c2 { background: #0d6efd; }
        .c3 { background: #198754; }
        .c4 { background: #6c757d; }
        .c5 { background: #17a2b8; }
        .c6 { background: #ffc107; color: black; }
        .c7 { background: #dc3545; }
        .c8 { background: #0d6efd; }
        .c9 { background: #198754; }
        .c10 { background: #6c757d; }
        .c11 { background: #17a2b8; }
        .c12 { background: #ffc107; color: black; }
        .c13 { background: #0d6efd; }
        .c14 { background: #ffc107; color: black; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-4">

    <!-- Row 1 -->
    <div class="row">
        <div class="col-sm-6 col-md-3 col-lg-3 box c1">Column 1</div>
        <div class="col-sm-6 col-md-3 col-lg-3 box c2">Column 2</div>
        <div class="col-sm-6 col-md-3 col-lg-3 box c3">Column 3</div>
        <div class="col-sm-6 col-md-3 col-lg-3 box c4">Column 4</div>
    </div>

    <!-- Row 2 -->
    <div class="row">
        <div class="col-sm-12 col-md-4 col-lg-4 box c5">Column 5</div>
        <div class="col-sm-12 col-md-8 col-lg-8 box c6">Column 6</div>
    </div>

    <!-- Row 3 -->
    <div class="row">
        <div class="col-sm-12 col-md-6 col-lg-6 box c7">Column 7</div>
        <div class="col-sm-12 col-md-6 col-lg-6 box c8">Column 8</div>
    </div>

    <!-- Row 4 -->
    <div class="row">
        <div class="col-sm-12 col-md-7 col-lg-7 box c9">Column 9</div>
        <div class="col-sm-12 col-md-5 col-lg-5 box c10">Column 10</div>
    </div>

    <!-- Row 5 -->
    <div class="row">
        <div class="col-sm-12 col-md-8 col-lg-8 box c11">Column 11</div>
        <div class="col-sm-12 col-md-4 col-lg-4 box c12">Column 12</div>
    </div>

    <!-- Row 6 -->
    <div class="row">
        <div class="col-sm-12 col-md-5 col-lg-5 box c13">Column 13</div>
        <div class="col-sm-12 col-md-7 col-lg-7 box c14">Column 14</div>
    </div>

</div>

</body>
</html>
