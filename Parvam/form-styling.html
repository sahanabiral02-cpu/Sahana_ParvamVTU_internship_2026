<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .form-field{
            margin: 20px;
        }
        label{
            font-size: 20px;
            font-weight: bold;
        }
        label{
            width: 100px;
            padding: 5px;
            font-size: 20px;
            color: violet;
            text-transform: uppercase;
        }
        <input: :focus{
            border:10px solid lightskyblue;
        }
         input[type="checkbox"], input [type="radio"]{
            width: auto;
        }
        input:chcked{
            outline: 2px solid red;
        }
        input:out-of-range{
            border: 10px solid red;
            background-color: lightcoral;
            color: black;
        }
        input:required{
            border: 2px solid red;
        }
        input:disabled{
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <h1>Registration Form</h1>
    <form>
        <div class="form-field">
            <label for="name">Name:</label>
            <input type="text" name="name" id="name">
        </div>
        <div class="form-field">
            <label for="email">Email ID:</label>
            <input type="email" name="email" id="email">
        </div>
        <div class="form-field">
            <label for="phone">Phone Number:</label>
            <input type="tel" name="phone" id="phone">
        </div>
        <div class="form-field">
            <label for="password">Password:</label>
            <input type="password" name="password" id="password">
        </div>
        <div class="form-field">
            <label for="address">Address:</label>
            <textarea rows="10" cols="50" name="address" id="address"></textarea>
        </div>
        <div class="form-field">
            <label for="gender">Gender:</label>
            <input type="radio" name="gender" id="male" value="Male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="Female">
            <label for="female">Female</label>
        </div>
        <div class="form-field">
            <label for="subject">Favorite Subjects:</label>
            <input type="checkbox" name="subject" id="physics" value="Physics">
            <label for="physics">Physics</label>
            <input type="checkbox" name="subject" id="chemistry" value="Chemistry">
            <label for="chemistry">Chemistry</label>
            <input type="checkbox" name="subject" id="mathematics" value="Mathematics">
            <label for="mathematics">Mathematics</label>
            <input type="checkbox" name="subject" id="computer-science" value="CS">
            <label for="computer-science">Computer Science</label>
        </div>
<div class="form-field">
            <label for="travelling-mode">Mode of Travelling:</label>
            <select name="travelling-mode" id="travelling-mode">
                <option value="">Select your Travelling Mode</option>
                <option value="Bus">Bus</option>
                <option value="Car">Car</option>
                <option value="Bike">Bike</option>
                <option value="Cab">Cab</option>
                <option value="Metro">Metro</option>
            </select>
        </div>
    </div>
    <div class=""form-field btn
        <input class="reset-btn" type="reset" value="Clear Form">
        <input type="submit" value="Submit Form">
    </form>
</body>
</html>
