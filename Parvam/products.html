<!DOCTYPE html>
<html>
<head>
    <title>Ecommerce</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .product-header {
            background-color: #1f7a4d;
            color: white;
            padding: 30px 0;
            text-align: center;
        }

        .card img {
            height: 200px;
            object-fit: cover;
        }

        .card {
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="#">Ecommerce</a>
        <ul class="navbar-nav d-flex flex-row">
            <li class="nav-item me-3">
                <a class="nav-link" href="#">Home</a>
            </li>
            <li class="nav-item me-3">
                <a class="nav-link active" href="#">Products</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Locations</a>
            </li>
        </ul>
    </div>
</nav>

<!-- Products Header -->
<div class="product-header">
    <h1>Products</h1>
</div>

<!-- Product Cards -->
<div class="container mt-4">
    <div class="row">

        <!-- Car -->
        <div class="col-md-3">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Car</h5>
                    <p class="card-text">High speed racing car.</p>
                </div>
            </div>
        </div>

        <!-- Drone -->
        <div class="col-md-3"> 
            <div class="card">
                <img src="https://picsum.photos/300/200?random=2" class="card-img-top" alt="Drone">
                <div class="card-body">
                    <h5 class="card-title">Drone</h5>
                    <p class="card-text">Professional aerial drone.</p>
             </div>
            </div>
        </div>

        <!-- Teddy -->
        <div class="col-md-3">
            <div class="card">
               <img src="https://picsum.photos/300/200?random=5" class="card-img-top" alt="Teddy">
                <div class="card-body">
                    <h5 class="card-title">Teddy Bear</h5>
                    <p class="card-text">Soft and cute teddy bear.</p>
                </div>
            </div>
        </div>


        <!-- Laptop -->
        <div class="col-md-3">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text">Latest high performance laptop.</p>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
